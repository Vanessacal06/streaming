<!DOCTYPE html>
<html lang="es" data-tema="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELORA | Planes</title>
  <link rel="stylesheet" href="./index.css">
  <link rel="stylesheet" href="./planes.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./efectos.js"></script>
  <script src="./externalApi.js"></script>
</head>
<body>

  <!-- BARRA UTILIDADES -->
  <nav class="util-bar" aria-label="Utilidades globales">
    <select id="selector-region" class="util-btn selector-region" onchange="cambiarRegion(this.value)">
      <option value="CO">🇨🇴 COP</option>
      <option value="US">🇺🇸 USD</option>
      <option value="MX">🇲🇽 MXN</option>
      <option value="AR">🇦🇷 ARS</option>
      <option value="CL">🇨🇱 CLP</option>
      <option value="ES">🇪🇺 EUR</option>
      <option value="PE">🇵🇪 PEN</option>
      <option value="BR">🇧🇷 BRL</option>
    </select>
    <span id="region-indicator" class="util-btn region-badge">📍 ...</span>
    <button class="util-btn" id="btn-tema" onclick="toggleTema()">☀️ Claro</button>
    <button class="util-btn" onclick="toggleIdioma()">
      <span id="txt-idioma-btn">EN</span>
    </button>
    <button class="util-btn" onclick="abrirPerfil()">👤 <span id="txt-perfil">Mi Perfil</span></button>
    <button class="util-btn btn-logout" onclick="cerrarSesion()">🚪 Salir</button>
  </nav>

  <!-- HERO -->
    <!-- HERO -->
  <header class="hero">
    <h1 id="txt-elegir" data-i18n="elegirPlan">ELIGE TU EXPERIENCIA</h1>
    <p data-i18n="elegirPlan_sub">Streaming ilimitado con calidad premium, historias épicas y una experiencia futurista.</p>
  </header>

  <!-- PLANES -->
  <section class="planes-wrapper">
    <p class="planes-title" data-i18n="planes_disponibles">PLANES DISPONIBLES</p>
    <article class="planes-container" id="planes"></article>
  </section>

  <!-- MODAL CARRITO -->
  <section class="modal-overlay oculto" id="modal-carrito" role="dialog" aria-modal="true">
    <section class="modal-box">
      <button class="modal-close" onclick="cerrarCarrito()">✕</button>
      <h3 data-i18n="carrito_titulo">🛒 Carrito de compra</h3>
      <section class="carrito-item">
        <section>
          <p class="carrito-item-nombre" id="carrito-plan-nombre">—</p>
          <p style="font-size:12px; color:var(--text3)" data-i18n="suscripcion_mensual">Suscripción mensual</p>
        </section>
        <p class="carrito-item-precio" id="carrito-plan-precio">—</p>
      </section>
      <p style="margin: 20px 0 14px; font-size:13px; color:var(--text2); font-weight:600; letter-spacing:1px;" data-i18n="pago_simulado">
        DATOS DE PAGO (simulado)
      </p>
      <input type="text" id="pago-nombre" data-i18n-ph="pago_nombre_ph" placeholder="Nombre en la tarjeta" maxlength="40">
      <input type="text" id="pago-numero" data-i18n-ph="pago_numero_ph" placeholder="1234 5678 9012 3456"
             maxlength="19" oninput="formatearNumeroTarjeta(this)">
      <section class="carrito-row">
        <input type="text" id="pago-exp" data-i18n-ph="pago_exp_ph" placeholder="MM/AA"
               maxlength="5" oninput="formatearExpiracion(this)">
        <input type="text" id="pago-cvv" data-i18n-ph="pago_cvv_ph" placeholder="CVV" maxlength="4">
      </section>
      <button onclick="procesarPago()" style="margin-top:10px" data-i18n="pagar_ahora">💳 PAGAR AHORA</button>
    </section>
  </section>

  <!-- MODAL PERFIL -->
  <section class="modal-overlay oculto" id="modal-perfil" role="dialog" aria-modal="true">
    <section class="modal-box">
      <button class="modal-close" onclick="cerrarPerfil()">✕</button>
      <h3>👤 Mi Perfil</h3>
      <section id="perfil-contenido"><p style="color:var(--text2)">Cargando...</p></section>
    </section>
  </section>

  <script src="./planes.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const txt = window.t();
      const idiomaBtn = document.getElementById("txt-idioma-btn");
      if (idiomaBtn) idiomaBtn.textContent = window.VELORA_IDIOMA === "es" ? "EN" : "ES";

      const elegir = document.getElementById("txt-elegir");
      if (elegir) elegir.textContent = txt.elegirPlan || "ELIGE TU EXPERIENCIA";

      const perfilBtn = document.getElementById("txt-perfil");
      if (perfilBtn) perfilBtn.textContent = txt.perfil || "Mi Perfil";

      // Poner el selector en la región guardada
      const selector = document.getElementById("selector-region");
      const regionGuardada = localStorage.getItem("velora_region") || "CO";
      if (selector) selector.value = regionGuardada;
      
      // Inicializar indicador visual
      if (typeof actualizarIndicadorUbicacion === 'function') actualizarIndicadorUbicacion();
      
      // Intentar detectar ubicación automáticamente
      setTimeout(() => window.cargarClima?.(), 300);
    });

    async function cerrarSesion() {
      const sb = window.supabaseClient || window.supabase.createClient(
        "https://ytdkmyotjzaissxfjjuu.supabase.co",
        "sb_publishable_6_4LFbvOzGUfsnGyhgQvjQ_2JCVJxlH"
      );
      await sb.auth.signOut();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
